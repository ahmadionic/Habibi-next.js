name: Habibi CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Build Habibi Application
        run: npm run build

      - name: Build Docker Image
        run: docker build -t nextjs-app:latest .

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@0.31.0
        with:
          image-ref: nextjs-app:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Pipeline Completed
        run: echo "CI Pipeline executed successfully."